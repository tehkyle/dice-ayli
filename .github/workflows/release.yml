name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create the GitHub Release and upload assets

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: showrunner/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: showrunner

      # Bake OAuth credentials into .env so they're bundled inside the app.
      # Set GOOGLE_OAUTH_CLIENT_ID and GOOGLE_OAUTH_CLIENT_SECRET as repository
      # secrets at Settings → Secrets and variables → Actions.
      - name: Write .env from secrets
        working-directory: showrunner
        run: |
          cat > .env << 'EOF'
          PORT=3000
          QLAB_HOST=127.0.0.1
          QLAB_SEND_PORT=53000
          QLAB_RECEIVE_PORT=53001
          GOOGLE_OAUTH_CLIENT_ID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET=${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          EOF

      - name: Build frontend
        working-directory: showrunner
        run: npm run build

      # electron-builder runs scripts/afterPack.js between packing the .app and sealing
      # the DMG — that hook ad-hoc signs the app on the local filesystem where codesign
      # works reliably, before the DMG is created.
      # Builds both DMG (installer) and ZIP (used by electron-updater for in-place updates).
      - name: Build DMG + ZIP
        working-directory: showrunner
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --mac --publish never

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Dacha DICE: AYLI ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            showrunner/dist/*.dmg
            showrunner/dist/*.zip
            showrunner/dist/latest-mac.yml

