name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create the GitHub Release and upload assets

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: showrunner/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: showrunner

      # Bake OAuth credentials into .env so they're bundled inside the app.
      # Set GOOGLE_OAUTH_CLIENT_ID and GOOGLE_OAUTH_CLIENT_SECRET as repository
      # secrets at Settings → Secrets and variables → Actions.
      - name: Write .env from secrets
        working-directory: showrunner
        run: |
          cat > .env << 'EOF'
          PORT=3000
          QLAB_HOST=127.0.0.1
          QLAB_SEND_PORT=53000
          QLAB_RECEIVE_PORT=53001
          GOOGLE_OAUTH_CLIENT_ID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET=${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          EOF

      # Build the unpacked .app first (no DMG yet, no signing by electron-builder).
      - name: Build Electron app (unpacked)
        working-directory: showrunner
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --mac dir --publish never

      # Ad-hoc sign the .app bundle so macOS shows "unidentified developer"
      # (bypassable via right-click → Open) instead of "damaged" (not bypassable).
      - name: Ad-hoc sign and package DMG
        working-directory: showrunner
        run: |
          codesign --force --deep --sign - "dist/mac-arm64/Dacha-Dice-AYLI.app"
          hdiutil create \
            -volname "Dacha-Dice-AYLI" \
            -srcfolder "dist/mac-arm64/Dacha-Dice-AYLI.app" \
            -ov -format UDZO \
            "dist/Dacha-Dice-AYLI-mac.dmg"

      # Zip the QLab show folder (excludes backup files, DS_Store, Icon).
      - name: Zip QLab show files
        run: |
          zip -r qlab-show-files.zip qlab/ \
            -x "*backup*" \
            -x "*/.DS_Store" \
            -x "*/Icon"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Dacha DICE: AYLI ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            showrunner/dist/*.dmg
            qlab-show-files.zip

